name: Deploy PRODESIGN API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Sincronizar archivos al servidor
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          SOURCE: "./"
          TARGET: "/home/ftpceon/ftp/prodesign/prodesign-api/"
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: >
            /.git/,
            /.github/,
            node_modules/,
            dist/,
            logs/,
            .env,

      - name: Desplegar con Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /home/ftpceon/ftp/prodesign/prodesign-api/

            echo "========================================="
            echo "Archivos sincronizados:"
            ls -la
            echo "========================================="

            echo "Copiando .env si existe..."
            if [ -f .env ]; then
              echo ".env ya existe"
            fi

            echo "Validando docker-compose..."
            docker compose config > /dev/null

            echo "Deteniendo contenedores anteriores..."
            docker compose -p prodesign-backend down
            docker rm -f prodesign-backend 2>/dev/null || true
            echo "Liberando puertos 8000 y 8005..."
            for c in $(docker ps -q); do
              if docker port "$c" 2>/dev/null | grep -qE "800[05]"; then
                echo "Matando contenedor $c..."
                docker kill "$c"
                docker rm -f "$c"
              fi
            done
            sleep 2

            echo "Construyendo imágenes SIN CACHÉ..."
            docker compose -p prodesign-backend build --no-cache

            echo "Levantando contenedores..."
            docker compose -p prodesign-backend up -d --force-recreate

            echo "Limpiando imágenes residuales..."
            docker image prune -f

            echo "========================================="
            echo "Estado final:"
            docker compose -p prodesign-backend ps
            echo "Logs recientes:"
            docker compose -p prodesign-backend logs --tail=20
            echo "========================================="
